name: ci

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = clang ]; then
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DDATAPIPE_BUILD_BENCHMARKS=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        env:
          CXX: clang++
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DDATAPIPE_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
